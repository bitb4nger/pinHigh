baseURL = "https://pinhigh.dev/"
languageCode = "en-us"
title = "pinHigh"
theme = "PaperMod"

[params]
  description = "MCU projects, code examples, and embedded ideas"
  ShowReadingTime = true
  ShowCodeCopyButtons = true
  defaultTheme = "dark"

[markup.highlight]
  style = "monokai"
  lineNos = true

[build]
  command = "hugo"
  publish = "public"

[build.environment]
  HUGO_VERSION = "0.145.0"

[[menus.main]]
  name = "Home"
  url = "/"
  weight = 1

[[menus.main]]
  name = "Posts"
  url = "/posts/"
  weight = 2

[[menus.main]]
  name = "Projects"
  url = "/projects/"
  weight = 3

[[menus.main]]
  name = "About"
  url = "/about/"
  weight = 4